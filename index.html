    <style>
        /* Specific overrides for the Coming Soon / Maintenance Layout */
        .coming-soon-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            position: relative;
            z-index: 2;
            padding: 2rem;
        }
        
        .maintenance-badge {
            background: rgba(226, 169, 149, 0.05);
            border: 1px solid rgba(226, 169, 149, 0.2);
            color: var(--accent-color);
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 2rem;
            display: inline-block;
            backdrop-filter: blur(5px);
            animation: pulseBadge 2s infinite ease-in-out;
        }

        @keyframes pulseBadge {
            0%, 100% { border-color: rgba(226, 169, 149, 0.2); box-shadow: 0 0 0 transparent; }
            50% { border-color: rgba(226, 169, 149, 0.5); box-shadow: 0 0 10px rgba(226, 169, 149, 0.1); }
        }

        .newsletter-form {
            margin-top: 3rem;
            width: 100%;
            max-width: 450px;
            display: flex;
            gap: 1rem;
            background: rgba(15, 15, 15, 0.6);
            border: 1px solid var(--card-border);
            padding: 0.5rem 0.5rem 0.5rem 1.5rem;
            border-radius: 50px;
            backdrop-filter: blur(12px);
            transition: var(--transition-smooth);
        }

        .newsletter-form:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .newsletter-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.95rem;
        }

        .newsletter-input::placeholder {
            color: var(--text-secondary);
        }

        .newsletter-btn {
            background: var(--accent-color);
            border: none;
            color: var(--bg-color);
            padding: 0.8rem 1.8rem;
            border-radius: 40px;
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .newsletter-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 15px rgba(226, 169, 149, 0.3);
        }

        .social-footer {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1.5rem;
            z-index: 2;
        }

        @media (max-width: 576px) {
            .newsletter-form {
                flex-direction: column;
                background: transparent;
                border: none;
                padding: 0;
                gap: 1rem;
            }
            .newsletter-input {
                background: rgba(15, 15, 15, 0.6);
                border: 1px solid var(--card-border);
                padding: 1rem 1.5rem;
                border-radius: 30px;
                width: 100%;
                text-align: center;
            }
            .newsletter-btn {
                width: 100%;
                padding: 1rem;
            }
        }
    </style>
</head>
